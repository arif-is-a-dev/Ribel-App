<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk - Ribel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />
</head>
<body>
  <main class="center-screen">
    <div class="auth-grid fade-up">
      <div class="auth-illustration">
        <img src="{{ url_for('static', filename='images/astronaut-52.svg') }}" alt="Astronot" />
        <h2>Selamat datang kembali!</h2>
        <p>Lanjutkan petualangan belajarmu di Ribel. Yuk, lihat skor terbaru kamu!</p>
      </div>

      <div class="auth-card">
        <a href="{{ url_for('home') }}" class="brand-link">
          <span class="brand-mark">R</span> Ribel
        </a>

        <h1>Masuk ke akunmu</h1>
        <p class="sub">Senang lihat kamu lagi 👋</p>

        {% if error %}
          <div class="alert alert-error mb-4">⚠️ {{ error }}</div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST" class="form-stack">
          <div class="field">
            <label for="username">Username</label>
            <input class="input" type="text" id="username" name="username" placeholder="cth: budi" required autofocus />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input class="input" type="password" id="password" name="password" placeholder="Password kamu" required />
          </div>
          <button type="submit" class="btn btn-primary btn-block">Masuk</button>
        </form>

        <p class="auth-foot">
          Belum punya akun? <a href="{{ url_for('signup') }}">Daftar di sini</a>
        </p>
      </div>
    </div>
  </main>
</body>
</html>
