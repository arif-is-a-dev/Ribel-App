<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar - Ribel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />
</head>
<body>
  <main class="center-screen">
    <div class="auth-grid fade-up">
      <div class="auth-illustration">
        <img src="{{ url_for('static', filename='images/start-up-45.svg') }}" alt="Mulai" />
        <h2>Mulai petualanganmu!</h2>
        <p>Daftar gratis dan jadi yang teratas di leaderboard Ribel.</p>
      </div>

      <div class="auth-card">
        <a href="{{ url_for('home') }}" class="brand-link">
          <span class="brand-mark">R</span> Ribel
        </a>

        <h1>Buat akun baru</h1>
        <p class="sub">Cepet kok, cuma butuh beberapa detik ✨</p>

        {% if error %}
          <div class="alert alert-error mb-4">⚠️ {{ error }}</div>
        {% endif %}

        <form action="{{ url_for('signup') }}" method="POST" class="form-stack">
          <div class="field">
            <label for="username">Username</label>
            <input class="input" type="text" id="username" name="username" placeholder="cth: budi123" required autofocus />
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input class="input" type="email" id="email" name="email" placeholder="kamu@email.com" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input class="input" type="password" id="password" name="password" placeholder="Minimal 4 karakter" required minlength="4" />
          </div>
          <button type="submit" class="btn btn-primary btn-block">Daftar Sekarang</button>
        </form>

        <p class="auth-foot">
          Sudah punya akun? <a href="{{ url_for('login') }}">Masuk di sini</a>
        </p>
      </div>
    </div>
  </main>
</body>
</html>
